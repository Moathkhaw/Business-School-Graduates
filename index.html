<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الاستعلام | قمة الأعمال 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root {
            --primary-dark: #0f172a; 
            --primary-light: #1e293b;
            --gold: #d4af37; 
            --gold-hover: #b5952f;
            --text-light: #f8fafc;
            --text-dark: #334155;
            --bg-color: #f1f5f9;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at top, var(--primary-light) 0%, var(--primary-dark) 40%, var(--primary-dark) 100%);
            color: var(--text-light);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .header-section { text-align: center; margin-bottom: 30px; margin-top: 20px; }
        .header-section h1 { color: var(--gold); font-size: 2.5rem; margin-bottom: 5px; text-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .header-section p { color: #cbd5e1; font-size: 1.1rem; margin-top: 0; }

        .countdown-container { display: flex; justify-content: center; gap: 15px; margin-top: 25px; }
        .time-box {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 12px;
            padding: 15px;
            width: 70px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }
        .time-box span { display: block; font-size: 2rem; font-weight: 800; color: var(--gold); }
        .time-box small { font-size: 0.85rem; color: #e2e8f0; font-weight: 600; }

        .card {
            background: #ffffff;
            color: var(--text-dark);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            max-width: 450px;
            width: 100%;
            position: relative;
            z-index: 10;
        }

        .card h2 {
            text-align: center;
            color: var(--primary-dark);
            margin-top: 0;
            margin-bottom: 15px;
            font-weight: 800;
            border-bottom: 2px solid var(--gold);
            padding-bottom: 10px;
            display: inline-block;
            width: 100%;
        }

        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 700; color: var(--primary-dark); }
        input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-family: 'Cairo', sans-serif;
            font-size: 16px;
            box-sizing: border-box;
            background-color: #f8fafc;
            transition: all 0.3s;
        }
        input:focus { outline: none; border-color: var(--gold); box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.2); background-color: #fff; }

        .or-divider { text-align: center; margin: 25px 0; color: #94a3b8; font-weight: 700; position: relative; }
        .or-divider::before, .or-divider::after { content: ""; position: absolute; top: 50%; width: 40%; height: 2px; background-color: #f1f5f9; }
        .or-divider::before { right: 0; }
        .or-divider::after { left: 0; }

        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold-hover) 100%);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 800;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4);
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(212, 175, 55, 0.6); }

        #result-box { margin-top: 25px; padding: 20px; border-radius: 12px; display: none; }
        .success-box { background-color: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
        .error-box { background-color: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
        
        .wa-btn {
            display: block;
            margin-top: 15px;
            padding: 14px;
            background-color: #25D366;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 800;
            text-align: center;
        }
        .wa-btn:hover { background-color: #1ea952; }

        #status-msg { text-align: center; font-size: 14px; font-weight: 700; margin-bottom: 20px; color: #d97706; }
        .status-ok { color: #10b981 !important; }
        .status-err { color: #ef4444 !important; }
    </script>
</head>
<body>

    <div class="header-section">
        <h1>قمة الأعمال 2026</h1>
        <p>بوابة الاستعلام وتأكيد الحضور للخريجين</p>
        
        <div class="countdown-container">
            <div class="time-box"><span id="days">00</span><small>يوم</small></div>
            <div class="time-box"><span id="hours">00</span><small>ساعة</small></div>
            <div class="time-box"><span id="minutes">00</span><small>دقيقة</small></div>
            <div class="time-box"><span id="seconds">00</span><small>ثانية</small></div>
        </div>
    </div>

    <div class="card">
        <h2>تحقق من بياناتك</h2>
        
        <div id="status-msg">جاري الاتصال بقاعدة البيانات... ⏳</div>

        <div class="form-group">
            <label>الرقم الجامعي</label>
            <input type="number" id="idInput" placeholder="أدخل رقمك الجامعي هنا">
        </div>

        <div class="or-divider">أو</div>

        <div class="form-group">
            <label>رقم الهاتف</label>
            <input type="number" id="phoneInput" placeholder="07XXXXXXXX">
        </div>

        <button onclick="runSearch()">استعلام الآن</button>

        <div id="result-box"></div>
    </div>

    <script>
        // 1. برمجة العداد التنازلي
        const summitDate = new Date("May 15, 2026 10:00:00").getTime(); 
        const countdownFunction = setInterval(function() {
            const now = new Date().getTime();
            const distance = summitDate - now;
            document.getElementById("days").innerText = Math.floor(distance / (1000 * 60 * 60 * 24)).toString().padStart(2, '0');
            document.getElementById("hours").innerText = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)).toString().padStart(2, '0');
            document.getElementById("minutes").innerText = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2, '0');
            document.getElementById("seconds").innerText = Math.floor((distance % (1000 * 60)) / 1000).toString().padStart(2, '0');
            if (distance < 0) clearInterval(countdownFunction);
        }, 1000);

        // =================================================================
        // 2. الربط عبر رابط API المطورين الخاص بجوجل شيت (لتخطي الحظر)
        // =================================================================
        let db = [];
        const MY_PHONE = "962772536229";
        
        // تم تغيير الرابط هنا ليستخدم gviz/tq وهو الرابط السحري الذي لا يحظره المتصفح
        const googleSheetCSVUrl = "https://docs.google.com/spreadsheets/d/1YyxoA4BcsRsYidcnGKIECKejmtiCVZAlIw3VcOBIl6k/gviz/tq?tqx=out:csv";

        Papa.parse(googleSheetCSVUrl, {
            download: true,
            header: true,
            complete: function(res) { 
                db = res.data; 
                let statusEl = document.getElementById('status-msg');
                statusEl.innerText = "متصل بنجاح بالبيانات (الأنظمة جاهزة) ✅";
                statusEl.className = "status-ok";
                console.log("تم تحميل البيانات: ", db);
            },
            error: function(err) {
                let statusEl = document.getElementById('status-msg');
                statusEl.innerText = "⚠️ تأكد من أن جوجل شيت متاح (أي شخص لديه الرابط).";
                statusEl.className = "status-err";
                console.error("مشكلة في جلب البيانات:", err);
            }
        });

        // 3. دالة البحث
        function runSearch() {
            const idVal = document.getElementById('idInput').value.trim();
            const phoneVal = document.getElementById('phoneInput').value.trim();
            const resBox = document.getElementById('result-box');

            if (db.length === 0) {
                alert("قاعدة البيانات فارغة أو لم يتم تحميلها بشكل صحيح. تأكد من إعدادات مشاركة رابط جوجل.");
                return;
            }

            if (!idVal && !phoneVal) {
                alert("يرجى إدخال الرقم الجامعي أو رقم الهاتف للبحث.");
                return;
            }

            let cleanPhoneInput = phoneVal.replace(/^0+/, '');

            let match = db.find(s => {
                let sID = s["الرقم الجامعي"] ? String(s["الرقم الجامعي"]).trim() : "";
                let sPhone = s["الهاتف"] ? String(s["الهاتف"]).trim() : (s["رقم الهاتف"] ? String(s["رقم الهاتف"]).trim() : "");
                let cleanFilePhone = sPhone.replace(/^0+/, '');

                let isIdMatch = (idVal !== "" && sID === idVal);
                let isPhoneMatch = (cleanPhoneInput !== "" && cleanFilePhone === cleanPhoneInput);

                return isIdMatch || isPhoneMatch;
            });

            resBox.style.display = "block";

            if (match) {
                resBox.className = "success-box";
                resBox.innerHTML = `
                    <h3 style="margin-top:0; color: #166534;">تم العثور على بياناتك بنجاح ✅</h3>
                    <div style="font-size: 15px; line-height: 1.8;">
                        <strong>الاسم:</strong> ${match["الاسم"] || "غير محدد"}<br>
                        <strong>التخصص:</strong> ${match["التخصص"] || "غير محدد"}<br>
                        <strong>الرقم الجامعي:</strong> ${match["الرقم الجامعي"] || "غير محدد"}<br>
                        <span style="display:inline-block; margin-top:10px; padding:5px 10px; background:#dcfce7; border-radius:5px; border:1px solid #22c55e;">
                            حالة التسجيل: مؤكد في الفعالية 🎉
                        </span>
                    </div>
                    <hr style="border: 0; border-top: 1px solid #bbf7d0; margin: 15px 0;">
                    <small style="color: #15803d; font-weight: 600;">في حال وجود خطأ في البيانات، تواصل مع معاذ الخوالدة:</small>
                    <a href="https://wa.me/${MY_PHONE}" class="wa-btn">تواصل عبر واتساب</a>
                `;
            } else {
                let msg = encodeURIComponent("مرحباً معاذ، بياناتي غير مدرجة في نظام قمة الأعمال. \nالاسم: \nالرقم الجامعي: \nالهاتف: \nالتخصص: \n(مرفق صورة الحوالة)");
                resBox.className = "error-box";
                resBox.innerHTML = `
                    <h3 style="margin-top:0; color: #991b1b;">عذراً، البيانات غير مدرجة ⚠️</h3>
                    <p style="font-size: 14px; font-weight: 600;">لم نتمكن من العثور على اسمك في كشوفات المسجلين.</p>
                    <hr style="border: 0; border-top: 1px solid #fecaca; margin: 15px 0;">
                    <small style="color: #991b1b; font-weight: 600;">يرجى التواصل فوراً لتثبيت تسجيلك أو مراجعة الحوالة:</small>
                    <a href="https://wa.me/${MY_PHONE}?text=${msg}" class="wa-btn" style="background-color: #dc2626;">أرسل بياناتك عبر واتساب الآن</a>
                `;
            }
        }
    </script>
</body>
</html>
