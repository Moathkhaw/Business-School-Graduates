    <style>
        :root {
            --primary-dark: #0f172a; 
            --primary-light: #1e293b;
            --gold: #d4af37; 
            --text-light: #f8fafc;
            --bg-color: #020617;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at center, var(--primary-light) 0%, var(--primary-dark) 60%, #000000 100%);
            margin: 0; padding: 0; min-height: 100vh; overflow-x: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        /* --- شاشة الانترو (5 ثواني) --- */
        #intro-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color); z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 1s ease, visibility 1s;
        }
        .intro-box { text-align: center; color: white; animation: fadeInUp 1s ease-out; }
        .intro-logo { font-size: 5rem; color: var(--gold); margin-bottom: 20px; }
        .intro-title { font-size: 2.5rem; font-weight: 900; margin: 10px 0; }
        .dev-credit { font-size: 1.1rem; color: #94a3b8; margin-top: 20px; border-top: 1px solid #1e293b; padding-top: 15px; }
        .dev-credit span { color: var(--gold); font-weight: bold; }

        /* --- المحتوى الرئيسي --- */
        #main-content { display: none; width: 100%; max-width: 600px; padding: 20px; box-sizing: border-box; opacity: 0; transition: opacity 1s ease; }
        
        .card {
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(15px);
            padding: 40px; border-radius: 28px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        h2 { text-align: center; color: var(--primary-dark); font-weight: 800; margin-bottom: 25px; }

        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 700; color: var(--primary-dark); }
        input {
            width: 100%; padding: 16px; border: 2px solid #e2e8f0; border-radius: 14px; box-sizing: border-box;
            font-size: 18px; font-family: 'Cairo'; text-align: center; transition: 0.3s; font-weight: bold;
        }
        input:focus { border-color: var(--gold); outline: none; box-shadow: 0 0 0 4px rgba(212, 175, 55, 0.1); }

        button.search-btn {
            width: 100%; padding: 18px; background: linear-gradient(135deg, var(--gold) 0%, #a38222 100%);
            color: white; border: none; border-radius: 14px; font-size: 18px; font-weight: 800; cursor: pointer;
            box-shadow: 0 10px 20px -5px rgba(212, 175, 55, 0.4); transition: 0.3s;
        }
        button.search-btn:hover { transform: translateY(-3px); }

        /* --- تصميم التذكرة المولدة --- */
        #result-container { margin-top: 30px; display: none; }
        
        #ticket-render-area {
            background: white; padding: 20px; border-radius: 12px; border: 1px solid #ddd;
            color: black; direction: ltr; margin-bottom: 20px;
        }

        .ticket-stub {
            border: 1px solid #000; padding: 15px; margin-bottom: 15px; position: relative;
            background: #fff; display: flex; flex-direction: column;
        }
        .stub-header { font-size: 12px; font-weight: bold; border-bottom: 1px solid #eee; padding-bottom: 5px; margin-bottom: 10px; }
        .stub-body { display: flex; justify-content: space-between; align-items: flex-start; }
        .stub-info { flex: 1; font-size: 13px; }
        .stub-qr { width: 90px; height: 90px; }
        .stub-barcode { margin-top: 15px; text-align: center; }
        .stub-barcode img { height: 50px; width: 100%; }
        .stub-footer { font-size: 10px; color: #666; margin-top: 10px; border-top: 1px dotted #ccc; padding-top: 5px; }

        .shelf-display {
            background: var(--primary-dark); color: white; padding: 20px; border-radius: 16px;
            text-align: center; margin-top: 20px; border-right: 5px solid var(--gold);
        }
        .shelf-display span { font-size: 0.9rem; color: #cbd5e1; }
        .shelf-display strong { display: block; font-size: 2.5rem; color: var(--gold); }

        .download-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .btn-dl {
            padding: 15px; border-radius: 12px; border: none; color: white; font-weight: 800;
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 14px;
        }
        .btn-png { background: #3b82f6; }
        .btn-pdf { background: #ef4444; }

        window.onload = () => {
            setTimeout(() => {
                document.getElementById('intro-overlay').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('intro-overlay').style.visibility = 'hidden';
                    const main = document.getElementById('main-content');
                    main.style.display = 'block';
                    setTimeout(() => main.style.opacity = '1', 50);
                }, 1000);
            }, 5000);
        };

        function handleSearch() {
            const input = document.getElementById('stuId').value.trim();
            const result = document.getElementById('result-container');
            
            if (!input) {
                alert("يرجى إدخال بيانات للبحث!");
                return;
            }

            // البحث بالرقم الجامعي، أو رقم الهاتف (للطلاب الجدد)، أو الاسم
            const match = graduates.find(g => 
                g.id === input || 
                (g.phone && g.phone === input) || 
                g.name.includes(input)
            );

            if (match) {
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                document.getElementById('displayName').innerText = match.name;
                document.getElementById('displayMajor').innerText = match.major;
                document.getElementById('displayShelf').innerText = match.shelf;
                
                document.getElementById('waLink').href = `https://wa.me/962772536229?text=مرحبا معاذ، أنا الخريج ${match.name} واحتاج مساعدة.`;

                // بناء التذاكر برمجياً
                const list = document.getElementById('tickets-list');
                list.innerHTML = '';
                match.codes.forEach((code, i) => {
                    const div = document.createElement('div');
                    div.className = 'ticket-stub';
                    div.innerHTML = `
                        <div class="stub-header">TICKET ${i+1} OF 4</div>
                        <div class="stub-body">
                            <div class="stub-info">
                                <b>EVENT:</b> Business Summit 2026<br>
                                <b>TYPE:</b> Guest Entry<br>
                                <div style="margin-top:10px; font-size:18px; color:#d4af37; font-family:monospace;">CODE: ${code}</div>
                            </div>
                            <div class="stub-qr" id="qr-${i}"></div>
                        </div>
                        <div class="stub-barcode"><svg id="bc-${i}"></svg></div>
                        <div class="stub-footer">Generated via Graduate Portal - Developed by Moath Al-Khawalda</div>
                    `;
                    list.appendChild(div);

                    // توليد QR و Barcode لحظياً
                    new QRCode(document.getElementById(`qr-${i}`), { text: code, width: 90, height: 90 });
                    JsBarcode(`#bc-${i}`, code, { format: "CODE128", height: 40, displayValue: false });
                });

                result.style.display = 'block';
            } else {
                alert("عذراً، لم يتم العثور على نتائج. يرجى التأكد من الرقم أو الاسم والمحاولة مرة أخرى.");
                result.style.display = 'none';
            }
        }

        async function downloadImage() {
            const element = document.getElementById('ticket-render-area');
            const canvas = await html2canvas(element, { scale: 2 });
            const link = document.createElement('a');
            link.download = `تذاكر_المرافقين_${document.getElementById('stuId').value}.png`;
            link.href = canvas.toDataURL();
            link.click();
        }

        async function downloadPDF() {
            const { jsPDF } = window.jspdf;
            const element = document.getElementById('ticket-render-area');
            const canvas = await html2canvas(element, { scale: 2 });
            const imgData = canvas.toDataURL('image/png');
            const pdf = new jsPDF('p', 'mm', 'a4');
            const width = pdf.internal.pageSize.getWidth();
            const height = (canvas.height * width) / canvas.width;
            pdf.addImage(imgData, 'PNG', 0, 10, width, height);
            pdf.save(`تذاكر_المرافقين_${document.getElementById('stuId').value}.pdf`);
        }
